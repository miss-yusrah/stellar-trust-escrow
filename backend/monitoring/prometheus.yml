global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'stellar-trust-escrow'
    static_configs:
      - targets: ['host.docker.internal:4000']
    metrics_path: '/metrics'
    # If you set METRICS_TOKEN, add bearer_token here:
    # bearer_token: 'your_token_here'
